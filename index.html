<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Plaza Flipper & Market Matrix</title>
    <link rel="icon" href="data:,">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #08090d; color: #e2e8f0; padding: 25px; }
        .wrapper { max-width: 1500px; margin: 0 auto; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #10101a; padding: 20px; border-radius: 12px; 
            border: 1px solid #1c1c2e; margin-bottom: 20px; 
        }
        header h1 { color: #3b82f6; font-size: 1.5rem; }
        .status { font-size: 0.85rem; background: #1c1c2e; padding: 6px 12px; border-radius: 20px; border: 1px solid #2b2b40; }

        .console-panel {
            background: #10101a; border: 1px solid #1c1c2e; border-radius: 12px;
            padding: 20px; margin-bottom: 20px; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; align-items: end;
        }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; }
        .console-panel input, .console-panel select {
            background: #161624; border: 1px solid #2b2b40; padding: 10px; border-radius: 6px; color: white; font-weight: bold; outline: none;
        }
        .console-panel input:focus, .console-panel select:focus { border-color: #3b82f6; }

        .matrix-table { width: 100%; border-collapse: collapse; background: #10101a; border-radius: 12px; overflow: hidden; border: 1px solid #1c1c2e; }
        .matrix-table th { background-color: #161624; color: #94a3b8; text-align: left; padding: 15px 20px; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid #1c1c2e; }
        .matrix-table td { padding: 14px 20px; border-bottom: 1px solid #1c1c2e; vertical-align: middle; }
        .matrix-table tr { transition: background-color 0.2s; }
        .matrix-table tr:hover { background-color: #131322; }

        .snipe-alert-row {
            background-color: rgba(239, 68, 68, 0.08) !important;
            border: 2px solid #ef4444 !important;
        }
        .snipe-badge {
            background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; 
            border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 4px;
            box-shadow: 0 0 8px #ef4444; text-transform: uppercase;
        }

        .item-cell { display: flex; align-items: center; gap: 12px; }
        .item-category-tag { font-size: 0.7rem; text-transform: uppercase; background: #1c1c2e; padding: 2px 6px; border-radius: 4px; color: #94a3b8; margin-top: 4px; display: inline-block; }
        
        .var-badge { font-size: 0.7rem; font-weight: bold; padding: 1px 5px; border-radius: 3px; margin-left: 5px; }
        .normal { background: #334155; color: #cbd5e1; }
        .gold { background: #eab308; color: #0f172a; }
        .rainbow { background: linear-gradient(45deg, #ef4444, #3b82f6); color: white; }

        .highlight-rap { color: #38bdf8; font-weight: bold; }
        .highlight-buy { color: #f59e0b; font-weight: bold; }
        .highlight-sell { color: #10b981; font-weight: bold; }
        
        .demand-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-align: center; }
        .demand-high { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .demand-mid { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .demand-low { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.3); }

        .manipulated-tag {
            background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444;
            padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; margin-top: 4px;
        }

        .loading { text-align: center; padding: 40px; color: #94a3b8; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div>
            <h1>Universal Plaza Flipper & Pro Automation Matrix</h1>
            <p style="color:#64748b; font-size:0.85rem; margin-top:2px;">Real-time asset parsing engine with built-in anti-manipulation filters</p>
        </div>
        <div class="status"><span style="color:#10b981;">●</span> Engine: Active</div>
    </header>

    <div class="console-panel">
        <div class="input-group">
            <label>Search Asset Name</label>
            <input type="text" id="searchFilter" placeholder="Type name..." oninput="renderTable()">
        </div>
        <div class="input-group">
            <label>Filter Category</label>
            <select id="categoryFilter" onchange="renderTable()">
                <option value="ALL">-- All Categories --</option>
                <option value="Pet">Pets Only</option>
                <option value="Enchant">Enchants</option>
                <option value="Potion">Potions</option>
                <option value="Eggs_Boxes_Lootboxes">Lootboxes / Eggs</option>
                <option value="MiscItems">Misc Items</option>
            </select>
        </div>
        <div class="input-group">
            <label>Plaza Rarity Tier</label>
            <select id="tierFilter" onchange="renderTable()">
                <option value="ALL">-- All Tiers --</option>
                <option value="Huge">Huge Pets Only</option>
                <option value="Titanic">Titanic Pets Only</option>
                <option value="Exclusive">Exclusives Only</option>
                <option value="Standard">Standard Assets</option>
            </select>
        </div>
        <div class="input-group">
            <label>Your Current Diamonds</label>
            <input type="number" id="playerBudget" placeholder="e.g. 50000000" oninput="renderTable()">
        </div>
        <div class="input-group">
            <label>Max Buy Cutoff (% of RAP)</label>
            <input type="number" id="buyPct" value="85" min="50" max="100" onchange="renderTable()">
        </div>
        <div class="input-group">
            <label>Target Resell Markup (% of RAP)</label>
            <input type="number" id="sellPct" value="105" min="100" max="150" onchange="renderTable()">
        </div>
    </div>

    <table class="matrix-table">
        <thead>
            <tr>
                <th style="width: 32%;">Asset Identifier</th>
                <th style="width: 13%;">Live RAP</th>
                <th style="width: 17%;">Market Safety & Demand</th>
                <th style="width: 20%;">Plaza Buy & Sell Targets</th>
                <th style="width: 18%;">Net Flip Margin (Deducted 1% Tax)</th>
            </tr>
        </thead>
        <tbody id="matrixGrid">
            <tr>
                <td colspan="5" class="loading">Parsing data channels...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    let combinedDatabaseBuffer = [];

    async function loadGlobalDatabase() {
        try {
            const [rapRes, existsRes] = await Promise.all([
                fetch('https://ps99.biggamesapi.io/api/rap'),
                fetch('https://ps99.biggamesapi.io/api/exists')
            ]);
            
            const rapJson = await rapRes.json();
            const existsJson = await existsRes.json();
            
            if (rapJson.status === "ok" && existsJson.status === "ok") {
                // FIXED: Lowered threshold so lower value eggs, hype gifts, and items show up perfectly
                const rawRapData = rapJson.data.filter(item => item.value && item.value >= 1000);
                
                combinedDatabaseBuffer = rawRapData.map(rapItem => {
                    const match = existsJson.data.find(e => 
                        e.configData?.id === rapItem.configData?.id && 
                        e.configData?.pt === rapItem.configData?.pt && 
                        e.configData?.sh === rapItem.configData?.sh &&
                        e.configData?.tn === rapItem.configData?.tn
                    );
                    
                    const existCount = match ? match.value : 0;
                    const calculatedDemand = calculateDemandScore(rapItem.value, existCount, rapItem.category, rapItem.configData?.id);

                    return {
                        ...rapItem,
                        exists: existCount,
                        demandScore: calculatedDemand.score,
                        demandTier: calculatedDemand.tier,
                        speed: calculatedDemand.speed,
                        isManipulated: calculatedDemand.isManipulated
                    };
                });

                renderTable();
            } else {
                showMsg("Internal data node parsing failure.", true);
            }
        } catch (e) {
            showMsg("Failed to connect to the live endpoints.", true);
        }
    }

    function calculateDemandScore(rap, exists, category, name) {
        let isManipulated = false;
        let lowerName = (name || "").toLowerCase();
        
        if (exists > 0 && exists < 2500 && rap > 25000000 && !lowerName.includes("huge") && !lowerName.includes("titanic")) {
            isManipulated = true;
        }

        if (!exists || exists === 0) return { score: 5, tier: "demand-mid", speed: "Normal Speed", isManipulated };
        let ratioScore = Math.log10(rap) * 3 / Math.log10(exists);
        if (category === "Enchant" || category === "Potion") ratioScore *= 1.2;
        if (exists < 50) ratioScore += 3;
        let finalScore = Math.min(Math.max(Math.round(ratioScore), 1), 10);
        
        if (finalScore >= 8) return { score: finalScore, tier: "demand-high", speed: "🔥 Instant Flip", isManipulated };
        if (finalScore >= 5) return { score: finalScore, tier: "demand-mid", speed: "⚡ Medium Speed", isManipulated };
        return { score: finalScore, tier: "demand-low", speed: "⏳ Slow Move", isManipulated };
    }

    function renderTable() {
        const grid = document.getElementById('matrixGrid');
        grid.innerHTML = '';

        const searchQuery = document.getElementById('searchFilter').value.toLowerCase();
        const categorySelection = document.getElementById('categoryFilter').value;
        const tierSelection = document.getElementById('tierFilter').value;
        const budgetSelection = parseFloat(document.getElementById('playerBudget').value) || Infinity;
        
        const buyMultiplier = parseFloat(document.getElementById('buyPct').value) / 100;
        const sellMultiplier = parseFloat(document.getElementById('sellPct').value) / 100;

        combinedDatabaseBuffer.sort((a, b) => b.demandScore - a.demandScore || b.value - a.value);

        let trackingMatchCounter = 0;

        for (let i = 0; i < combinedDatabaseBuffer.length; i++) {
            if (trackingMatchCounter >= 150) break;

            const item = combinedDatabaseBuffer[i];
            const name = item.configData?.id || "Unknown Asset";
            const category = item.category || "Item";
            const rap = item.value;
            const buyTarget = Math.floor(rap * buyMultiplier);

            if (buyTarget > budgetSelection) continue;

            const lowerName = name.toLowerCase();
            let matchedTier = "Standard";
            if (lowerName.includes("huge")) matchedTier = "Huge";
            else if (lowerName.includes("titanic")) matchedTier = "Titanic";
            else if (lowerName.includes("exclusive")) matchedTier = "Exclusive";

            if (tierSelection !== "ALL" && matchedTier !== tierSelection) continue;
            
            if (categorySelection !== "ALL") {
                if (categorySelection === "Eggs_Boxes_Lootboxes") {
                    if (category !== "Eggs" && category !== "Boxes" && category !== "Lootboxes") continue;
                } else if (category !== categorySelection) {
                    continue;
                }
            }
            
            if (searchQuery && !lowerName.includes(searchQuery)) continue;

            trackingMatchCounter++;

            let variantClass = "normal";
            let variantLabel = "";
            if (item.configData?.pt === 1) { variantClass = "gold"; variantLabel = "GOLD"; }
            if (item.configData?.pt === 2) { variantClass = "rainbow"; variantLabel = "RB"; }
            if (item.configData?.sh) { variantClass = "rainbow"; variantLabel += " SHINY"; }
            if (item.configData?.tn) { variantLabel = `TIER ${item.configData.tn}`; }

            const sellTarget = Math.ceil(rap * sellMultiplier);
            const netReturn = Math.round((sellTarget * 0.99) - buyTarget);

            const isSnipeTarget = buyMultiplier <= 0.85 && item.demandScore >= 7 && !item.isManipulated;
            const rowClass = isSnipeTarget ? "class='snipe-alert-row'" : "";

            const row = `
                <tr ${rowClass}>
                    <td>
                        <div class="item-cell">
                            <div>
                                <span style="font-weight: bold; color: white;">${name}</span>
                                ${variantLabel ? `<span class="var-badge ${variantClass}">${variantLabel}</span>` : ''}
                                <br><span class="item-category-tag">${category}</span>
                                ${isSnipeTarget ? '<br><span class="snipe-badge">🚨 SNIPE TARGET</span>' : ''}
                            </div>
                        </div>
                    </td>
                    <td><span class="highlight-rap">${formatVal(rap)}</span></td>
                    <td>
                        ${item.isManipulated ? 
                            '<span class="manipulated-tag">⚠️ RAP MANIPULATED</span>' : 
                            `<span class="demand-tag ${item.demandTier}">Score: ${item.demandScore}/10</span>`
                        }
                        <div style="font-size: 11px; color: #64748b; margin-top: 4px;">${item.speed}</div>
                        <div style="font-size: 10px; color: #475569;">Supply: ${item.exists.toLocaleString()}</div>
                    </td>
                    <td>
                        <div style="font-size: 13px;"><span style="color:#64748b;">Buy Max:</span> <span class="highlight-buy">${formatVal(buyTarget)}</span></div>
                        <div style="font-size: 13px; margin-top:4px;"><span style="color:#64748b;">Sell Target:</span> <span class="highlight-sell">${formatVal(sellTarget)}</span></div>
                    </td>
                    <td style="color: ${netReturn > 0 ? '#10b981' : '#ef4444'}; font-weight: bold;">
                        ${netReturn > 0 ? '+' : ''}${formatVal(netReturn)}
                    </td>
                </tr>
            `;
            grid.insertAdjacentHTML('beforeend', row);
        }

        if (trackingMatchCounter === 0) {
            grid.innerHTML = `<tr><td colspan="5" class="loading">No matching items found within criteria or budget.</td></tr>`;
        }
    }

    // FIXED: Formatted strictly as a safe functional declaration to prevent console crashes
    function formatVal(n) {
        if (n >= 1000000000) return (n / 1000000000).toFixed(2) + 'B';
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
        return n.toLocaleString();
    }

    function showMsg(msg, isErr = false) {
        document.getElementById('matrixGrid').innerHTML = `<tr><td colspan="5" class="loading" style="color:${isErr ? '#ef4444' : '#94a3b8'};">⚠️ ${msg}</td></tr>`;
    }

    setInterval(loadGlobalDatabase, 300000);
    loadGlobalDatabase();
</script>
</body>
</html>
